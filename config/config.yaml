# ====================== Model Configuration ======================
model:
  name: "google/flan-t5-base"          # Options: base, large, xl
  # name: "google/flan-t5-large"
  max_input_length: 1024
  max_target_length: 128
  cache_dir: null                      # Leave null to use default HF cache

# ====================== Dataset Configuration ======================
dataset:
  name: "cnn_dailymail"
  version: "3.0.0"
  train_split: "train"
  validation_split: "validation"
  test_split: "test"
  # Optional: Use a smaller subset for quick testing
  # train_subset: 10000
  # val_subset: 1000

# ====================== Training Configuration ======================
training:
  output_dir: "./outputs/models/flan-t5-cnn"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 3e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  fp16: true
  bf16: false
  seed: 42
  logging_steps: 100
  eval_steps: 500
  save_steps: 1000
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "rouge2"
  greater_is_better: true

# ====================== Generation Configuration ======================
generation:
  max_length: 150
  min_length: 50
  num_beams: 4
  length_penalty: 2.0
  early_stopping: true
  no_repeat_ngram_size: 3

# ====================== Evaluation Configuration ======================
evaluation:
  metrics:
    - rouge
    - bertscore
  rouge_types:
    - rouge1
    - rouge2
    - rougeL
    - rougeLsum

# ====================== Logging & Experiment Tracking ======================
logging:
  use_wandb: false                    # Set to true when you add WANDB_API_KEY
  wandb_project: "flan-t5-cnn-dailymail"
  wandb_run_name: "flan-t5-base-run-1"
  logging_dir: "./logs"

# ====================== Hardware & Optimization ======================
hardware:
  use_accelerate: true
  num_workers: 4
  pin_memory: true
  torch_compile: false                # Set true for faster training (PyTorch 2.0+)